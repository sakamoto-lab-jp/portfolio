<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sakamoto Lab — Design & Web</title>
    <meta name="description" content="グラフィックデザインとWeb制作を中心とした坂本のポートフォリオサイトです。ロゴ・紙媒体・Webサイト制作の作品を掲載しています。">
    <link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <div class="layout">

        <aside class="sidebar">

            <h1 class="site-logo">
                <a href="../index.html">
                    <img src="../images/sakamotolab.svg" alt="Sakamoto Lab">
                </a>
            </h1>

            <nav class="main-nav" aria-label="Works filter and site navigation">
                <a href="../index.html?filter=web" class="filter-link">Web</a>
                <a href="../index.html?filter=graphic" class="filter-link">Graphic</a>
                <a href="../index.html?filter=logo" class="filter-link">Logo</a>
                <a href="../about.html" class="about-link">About</a>
            </nav>

        </aside>


        <main class="main-content">

            <section class="work-detail">

                <h2 class="work-detail-title">
                    企業ロゴ
                </h2>

                <p class="work-detail-category">
                    Logo
                </p>

                <div class="work-detail-hero">
                    <img src="../images/works/logo03.svg" alt="タイトルロゴ デザイン制作" class="detail-logo">
                </div>

                <div class="detail-usage">
                    <img src="../images/works/logo03b.jpg" alt="店舗サイン使用例">
                </div>

                <div class="work-detail-description">
                    <p>
                        企業ロゴのデザイン制作。
                        信頼感と視認性の両立を意識しながら、
                        シンプルで印象に残る構成を目指しました。
                    </p>
                    <p>
                        名刺やサインなど複数の使用環境を考慮し、
                        サイズが変わっても認識しやすい輪郭とバランスで設計しています。
                    </p>
                </div>

                <p class="works-caption">
                    Portfolio of graphic and web design works by Sakamoto.
                </p>

            </section>

        </main>

    </div>

    <script src="../js/main.js"></script>

</body>

</html>
